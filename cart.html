<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | TrendyWear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <h1 class="logo">TrendyWear</h1>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart (0)</a></li>
        </ul>
    </nav>
</header>

<section class="cart-container" style="max-width: 800px; margin: 40px auto; padding: 20px;">
    <h2>Your Shopping Cart</h2>
    
    <div class="cart-items">
        </div>

    <div class="cart-summary" style="margin-top: 30px; padding: 20px; background: #fdfaf7; border-radius: 10px; border: 1px solid #d4a373;">
    <h3 style="margin-bottom: 15px; color: #333;">Order Summary</h3>
    <hr style="border: 0.5px solid #ddd;">
    <p style="display: flex; justify-content: space-between; margin: 10px 0;">
        <span>Subtotal:</span> <span id="subtotal">Rs. 0</span>
    </p>
    <p style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; color: #d4a373;">
        <span>Total Payable:</span> <span id="final-total">Rs. 0</span>
    </p>
    
    <button onclick="processPayment()" class="cta-btn checkout-btn" style="width: 100%; background: #28a745; color: white; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s;">
        Pay Now Securely
    </button>
</div>
</section>

<script src="script.js"></script>
</body>
</html>
